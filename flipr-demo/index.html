<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Flipr</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', sans-serif;
    background: #f0eee9;
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 0;
  }

  #root {
    width: 390px;
    min-height: 100vh;
    background: #fafafa;
    display: flex;
    flex-direction: column;
    position: relative;
    overflow: hidden;
  }

  @keyframes flipr-spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  .mono { font-family: 'JetBrains Mono', monospace; }

  .label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: #6b6b6b;
  }

  ::-webkit-scrollbar { width: 0; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

const API_BASE = "http://127.0.0.1:8000";

/* ─── Shared top bar ─── */
function TopBar() {
  return (
    <div style={{ paddingTop: 56, paddingLeft: 20, paddingRight: 20, display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
      <span style={{ fontSize: 20, fontWeight: 700, color: '#1a1a1a', letterSpacing: '-0.4px' }}>
        Flipr<span style={{ color: '#4f6ef7' }}>.</span>
      </span>
      <div style={{
        width: 32, height: 32, borderRadius: '50%', background: '#e7e7e7',
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        fontFamily: 'JetBrains Mono, monospace', fontSize: 11, color: '#6b6b6b', letterSpacing: '0.4px'
      }}>JD</div>
    </div>
  );
}

/* ─── Hatched placeholder box ─── */
function HatchBox({ size, label }) {
  const id = `hatch-${size}-${label}`;
  return (
    <svg width={size} height={size} style={{ borderRadius: 8, flexShrink: 0 }}>
      <defs>
        <pattern id={id} patternUnits="userSpaceOnUse" width="8" height="8" patternTransform="rotate(45)">
          <line x1="0" y1="0" x2="0" y2="8" stroke="#c9c9c9" strokeWidth="1" strokeDasharray="3 3" />
        </pattern>
      </defs>
      <rect width={size} height={size} fill={`url(#${id})`} rx="8" />
      {label && (
        <text x={size/2} y={size/2 + 3} textAnchor="middle" fontFamily="JetBrains Mono, monospace" fontSize="9" fill="#9a9a9a" letterSpacing="0.5">{label}</text>
      )}
    </svg>
  );
}

/* ══════════════════════════════════════════
   SCREEN 1: UPLOAD
══════════════════════════════════════════ */
function UploadScreen({ onAnalyze }) {
  const [files, setFiles] = useState([]);
  const [previews, setPreviews] = useState([]);
  const inputRef = useRef(null);

  useEffect(() => {
    return () => previews.forEach(url => URL.revokeObjectURL(url));
  }, []);

  function handleFileChange(e) {
    const incoming = Array.from(e.target.files);
    const newUrls = incoming.map(f => URL.createObjectURL(f));
    setFiles(prev => [...prev, ...incoming].slice(0, 5));
    setPreviews(prev => [...prev, ...newUrls].slice(0, 5));
    e.target.value = '';
  }

  function removeFile(i) {
    URL.revokeObjectURL(previews[i]);
    setFiles(prev => prev.filter((_, idx) => idx !== i));
    setPreviews(prev => prev.filter((_, idx) => idx !== i));
  }

  const hasFiles = files.length > 0;

  return (
    <div style={{ display: 'flex', flexDirection: 'column', flex: 1, minHeight: 0 }}>
      <TopBar />
      <input
        ref={inputRef}
        type="file"
        multiple
        accept="image/*"
        style={{ display: 'none' }}
        onChange={handleFileChange}
      />

      {/* Title */}
      <div style={{ padding: '12px 20px 20px' }}>
        <div style={{ fontSize: 26, fontWeight: 700, letterSpacing: '-0.6px', color: '#1a1a1a' }}>New batch</div>
        <div style={{ fontSize: 14, color: '#6b6b6b', marginTop: 6 }}>Add up to 5 photos. We'll handle the rest.</div>
      </div>

      {/* Upload zone */}
      <div style={{ margin: '0 20px' }}>
        <div
          onClick={!hasFiles ? () => inputRef.current.click() : undefined}
          style={{
            position: 'relative',
            width: '100%',
            paddingTop: '100%',
            borderRadius: 14,
            border: hasFiles ? 'none' : '1.5px dashed #c9c9c9',
            background: hasFiles
              ? '#ffffff'
              : 'repeating-linear-gradient(135deg, transparent 0 10px, rgba(0,0,0,0.02) 10px 11px)',
            cursor: hasFiles ? 'default' : 'pointer',
            overflow: 'hidden',
          }}
        >
          <div style={{ position: 'absolute', inset: 0, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center' }}>
            {!hasFiles ? (
              <>
                <div style={{
                  width: 52, height: 52, borderRadius: '50%', background: '#ffffff',
                  border: '1px solid #e7e7e7', display: 'flex', alignItems: 'center', justifyContent: 'center'
                }}>
                  <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
                    <path d="M11 14V4M11 4L7 8M11 4L15 8" stroke="#1a1a1a" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"/>
                    <path d="M4 16v1a2 2 0 002 2h10a2 2 0 002-2v-1" stroke="#6b6b6b" strokeWidth="1.6" strokeLinecap="round"/>
                  </svg>
                </div>
                <div style={{ fontSize: 15, fontWeight: 500, color: '#1a1a1a', marginTop: 14 }}>Tap to upload photo</div>
                <div style={{ fontFamily: 'JetBrains Mono, monospace', fontSize: 11, color: '#9a9a9a', marginTop: 4 }}>JPG · PNG · HEIC</div>
              </>
            ) : (
              <div style={{
                width: '100%', height: '100%',
                display: 'grid',
                gridTemplateColumns: '1fr 1fr',
                gap: 8,
                padding: 12,
                alignContent: 'start',
              }}>
                {previews.map((url, i) => (
                  <div key={i} style={{
                    position: 'relative',
                    borderRadius: 10,
                    aspectRatio: '1',
                    overflow: 'hidden',
                  }}>
                    <img src={url} style={{ width: '100%', height: '100%', objectFit: 'cover' }} alt="" />
                    <button
                      onClick={e => { e.stopPropagation(); removeFile(i); }}
                      style={{
                        position: 'absolute', top: 5, right: 5,
                        width: 20, height: 20, borderRadius: '50%',
                        background: 'rgba(0,0,0,0.6)', border: 'none',
                        color: '#fff', fontSize: 13, lineHeight: 1,
                        cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center',
                        fontFamily: 'Inter, sans-serif',
                      }}
                    >×</button>
                  </div>
                ))}
                {files.length < 5 && (
                  <div
                    onClick={() => inputRef.current.click()}
                    style={{
                      background: '#f5f5f5',
                      border: '1.5px dashed #c9c9c9',
                      borderRadius: 10,
                      aspectRatio: '1',
                      display: 'flex', alignItems: 'center', justifyContent: 'center',
                      cursor: 'pointer',
                      flexDirection: 'column', gap: 4,
                    }}
                  >
                    <span style={{ fontSize: 22, color: '#9a9a9a', lineHeight: 1 }}>+</span>
                    <span style={{ fontFamily: 'JetBrains Mono, monospace', fontSize: 10, color: '#9a9a9a' }}>add</span>
                  </div>
                )}
              </div>
            )}
          </div>
        </div>
      </div>

      {/* Counter */}
      {hasFiles && (
        <div style={{ marginTop: 12, marginLeft: 20, marginRight: 20 }}>
          <span style={{ fontFamily: 'JetBrains Mono, monospace', fontSize: 11, color: '#9a9a9a' }}>
            {files.length} of 5 photos added
          </span>
        </div>
      )}

      <div style={{ flex: 1 }} />

      {/* Bottom dock */}
      <div style={{ padding: '12px 20px 48px', borderTop: '1px solid #f0f0f0' }}>
        <button
          onClick={() => hasFiles && onAnalyze(files)}
          disabled={!hasFiles}
          style={{
            width: '100%', height: 52, borderRadius: 12, border: 'none',
            background: hasFiles ? '#1a1a1a' : '#ececec',
            color: hasFiles ? '#ffffff' : '#9a9a9a',
            fontSize: 15, fontWeight: 600, cursor: hasFiles ? 'pointer' : 'not-allowed',
            fontFamily: 'Inter, sans-serif', letterSpacing: '-0.2px',
            transition: 'background 0.2s, color 0.2s',
          }}
        >
          Analyze Items →
        </button>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════
   SCREEN 2: PROCESSING
══════════════════════════════════════════ */
function ProcessingScreen({ files, onDone }) {
  const [phase, setPhase] = useState('uploading'); // 'uploading' | 'analyzing'
  const [error, setError] = useState(null);

  useEffect(() => {
    let cancelled = false;

    async function run() {
      try {
        // Step 1: Get presigned URLs
        const urlRes = await fetch(`${API_BASE}/api/v1/batch/uploads`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ files: files.map(f => ({ mime_type: f.type })) }),
        });
        if (!urlRes.ok) throw new Error(`upload-url ${urlRes.status}: ${await urlRes.text()}`);
        const { job_id, uploads } = await urlRes.json();

        // Step 2: Upload files to S3 concurrently
        await Promise.all(uploads.map((u, i) =>
          fetch(u.presigned_url, {
            method: 'PUT',
            headers: { 'Content-Type': files[i].type || 'image/jpeg' },
            body: files[i],
          })
        ));

        if (cancelled) return;
        setPhase('analyzing');

        // Step 3: Start batch analysis
        const analyzeRes = await fetch(`${API_BASE}/api/v1/batch/analyze`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            job_id,
            images: uploads.map((u, i) => ({
              s3_key: u.s3_key,
              mime_type: files[i].type || 'image/jpeg',
            })),
          }),
        });
        if (!analyzeRes.ok) throw new Error(`analyze ${analyzeRes.status}: ${await analyzeRes.text()}`);

        // Step 4: Poll until completed
        while (!cancelled) {
          await new Promise(r => setTimeout(r, 2000));
          if (cancelled) return;
          const statusRes = await fetch(`${API_BASE}/api/v1/batch/jobs/${job_id}`);
          if (!statusRes.ok) throw new Error(`jobs ${statusRes.status}`);
          const data = await statusRes.json();
          if (data.status === 'completed') {
            if (!cancelled) onDone(job_id, data);
            return;
          }
          if (data.status === 'failed') throw new Error(data.error || 'Job failed');
        }
      } catch (err) {
        if (!cancelled) setError(err.message);
      }
    }

    run();
    return () => { cancelled = true; };
  }, []);

  if (error) {
    return (
      <div style={{ display: 'flex', flexDirection: 'column', flex: 1, minHeight: 0 }}>
        <TopBar />
        <div style={{ padding: '12px 20px 20px' }}>
          <div style={{ fontSize: 26, fontWeight: 700, letterSpacing: '-0.6px', color: '#1a1a1a' }}>Something went wrong</div>
          <div style={{ fontSize: 14, color: '#dc2626', marginTop: 6, fontFamily: 'JetBrains Mono, monospace' }}>{error}</div>
        </div>
      </div>
    );
  }

  return (
    <div style={{ display: 'flex', flexDirection: 'column', flex: 1, minHeight: 0 }}>
      <TopBar />
      <div style={{ padding: '12px 20px 20px' }}>
        <div style={{ fontSize: 26, fontWeight: 700, letterSpacing: '-0.6px', color: '#1a1a1a' }}>
          {phase === 'uploading' ? 'Uploading photos…' : 'Analyzing your items…'}
        </div>
        <div style={{ fontSize: 14, color: '#6b6b6b', marginTop: 6 }}>Usually takes 10–20 seconds</div>
      </div>
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', flex: 1, paddingBottom: 80 }}>
        <div style={{
          width: 40, height: 40, borderRadius: '50%',
          border: '3px solid #e7e7e7', borderTopColor: '#4f6ef7',
          animation: 'flipr-spin 0.8s linear infinite',
        }} />
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════
   SCREEN 3: RESULTS
══════════════════════════════════════════ */
function ResultsScreen({ jobId, jobData, onReset }) {
  const listings = jobData.items.map((item, index) => ({
    itemIndex: index,
    metadata: item.result.metadata,
    comps: item.result.comps,
    poshmark: item.result.listings.find(l => l.platform === "poshmark"),
    ebay: item.result.listings.find(l => l.platform === "ebay"),
  }));

  return (
    <div style={{ display: 'flex', flexDirection: 'column', flex: 1, minHeight: 0 }}>
      <TopBar />

      <div style={{ padding: '12px 20px 20px' }}>
        <div style={{ fontSize: 26, fontWeight: 700, letterSpacing: '-0.6px', color: '#1a1a1a' }}>{listings.length} listings ready</div>
        <div style={{ fontSize: 14, color: '#6b6b6b', marginTop: 6 }}>Tap copy to use a listing</div>
      </div>

      {/* Scrollable listing cards */}
      <div style={{ flex: 1, overflowY: 'auto', padding: '0 20px 20px', display: 'flex', flexDirection: 'column', gap: 12 }}>
        {listings.map((listing) => (
          <ListingCard key={listing.itemIndex} listing={listing} jobId={jobId} itemIndex={listing.itemIndex} />
        ))}
      </div>

      {/* Bottom dock */}
      <div style={{ padding: '12px 20px 48px', borderTop: '1px solid #f0f0f0', flexShrink: 0 }}>
        <button
          onClick={onReset}
          style={{
            width: '100%', height: 44, borderRadius: 10, border: '1px solid #d4d4d4',
            background: '#ffffff', color: '#1a1a1a',
            fontSize: 14, fontWeight: 500, cursor: 'pointer', fontFamily: 'Inter, sans-serif',
          }}
        >
          ← Start new batch
        </button>
      </div>
    </div>
  );
}

/* ─── Listing card sub-components ─── */
function FieldLabel({ children }) {
  return (
    <div style={{
      fontFamily: 'JetBrains Mono, monospace', fontSize: 11,
      textTransform: 'uppercase', letterSpacing: '0.8px',
      color: '#6b6b6b', marginBottom: 5,
    }}>{children}</div>
  );
}

function FieldRow({ label, value }) {
  return (
    <div style={{ marginBottom: 14 }}>
      <FieldLabel>{label}</FieldLabel>
      <div style={{ fontSize: 14, fontWeight: 500, color: '#1a1a1a' }}>{value}</div>
    </div>
  );
}

function PoshmarkContent({ pm, price, expanded, setExpanded }) {
  const earnings = (price * 0.80).toFixed(2);
  return (
    <>
      <FieldRow label="Title" value={pm.title || '—'} />

      <div style={{ marginBottom: 14 }}>
        <FieldLabel>Description</FieldLabel>
        <div style={{
          fontSize: 13, color: '#6b6b6b', lineHeight: 1.5,
          display: '-webkit-box', WebkitBoxOrient: 'vertical',
          WebkitLineClamp: expanded ? 'unset' : 2, overflow: 'hidden',
        }}>{pm.description || ''}</div>
        <button onClick={() => setExpanded(e => !e)} style={{
          background: 'none', border: 'none', color: '#4f6ef7', fontSize: 13,
          cursor: 'pointer', marginTop: 4, padding: 0, fontFamily: 'Inter, sans-serif',
        }}>{expanded ? 'Show less ↑' : 'Show more →'}</button>
      </div>

      {pm.category && <FieldRow label="Category" value={pm.category} />}
      {pm.size && <FieldRow label="Size" value={pm.size} />}
      {pm.condition && <FieldRow label="Condition" value={pm.condition} />}
      {pm.brand && <FieldRow label="Brand" value={pm.brand} />}
      {pm.color && <FieldRow label="Color" value={pm.color} />}

      {pm.style_tags?.length > 0 && (
        <div style={{ marginBottom: 14 }}>
          <FieldLabel>Style Tags</FieldLabel>
          <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6 }}>
            {pm.style_tags.map(tag => (
              <span key={tag} style={{
                background: '#eff3ff', color: '#4f6ef7',
                fontSize: 12, padding: '3px 8px', borderRadius: 6,
                fontFamily: 'JetBrains Mono, monospace',
              }}>{tag}</span>
            ))}
          </div>
        </div>
      )}

      <div>
        <FieldLabel>Price &amp; Earnings</FieldLabel>
        <div style={{ fontSize: 13, color: '#6b6b6b', display: 'flex', alignItems: 'center', gap: 6, flexWrap: 'wrap' }}>
          <span>Listing Price: <strong style={{ color: '#1a1a1a' }}>${price.toFixed(2)}</strong></span>
          <span style={{ color: '#c9c9c9' }}>→</span>
          <span>Your Earnings: <strong style={{ color: '#4f6ef7' }}>${earnings}</strong></span>
        </div>
      </div>
    </>
  );
}

function EbayContent({ eb, price, expanded, setExpanded }) {
  const title = eb.title || '';
  const charCount = title.length;
  const specs = eb.item_specifics || {};
  const hasSpecs = Object.keys(specs).length > 0;
  return (
    <>
      <div style={{ marginBottom: 14 }}>
        <FieldLabel>Title</FieldLabel>
        <div style={{ fontSize: 14, fontWeight: 500, color: '#1a1a1a' }}>{title}</div>
        <div style={{
          fontFamily: 'JetBrains Mono, monospace', fontSize: 10, marginTop: 3,
          color: charCount > 70 ? '#c0392b' : '#9a9a9a',
        }}>{charCount}/80 characters</div>
      </div>

      {eb.category && <FieldRow label="Category" value={eb.category} />}
      {eb.condition && <FieldRow label="Condition" value={eb.condition} />}

      {hasSpecs && (
        <div style={{ marginBottom: 14 }}>
          <FieldLabel>Item Specifics</FieldLabel>
          <div style={{
            display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '7px 12px',
            background: '#fafafa', borderRadius: 8, padding: '10px 12px',
            border: '1px solid #f0f0f0',
          }}>
            {Object.entries(specs).map(([k, v]) => (
              <React.Fragment key={k}>
                <div style={{ fontFamily: 'JetBrains Mono, monospace', fontSize: 11, color: '#9a9a9a' }}>{k}</div>
                <div style={{ fontSize: 13, fontWeight: 500, color: '#1a1a1a' }}>{v}</div>
              </React.Fragment>
            ))}
          </div>
        </div>
      )}

      <div style={{ marginBottom: 14 }}>
        <FieldLabel>Description</FieldLabel>
        <div style={{
          fontSize: 13, color: '#6b6b6b', lineHeight: 1.5,
          display: '-webkit-box', WebkitBoxOrient: 'vertical',
          WebkitLineClamp: expanded ? 'unset' : 2, overflow: 'hidden',
        }}>{eb.description || ''}</div>
        <button onClick={() => setExpanded(e => !e)} style={{
          background: 'none', border: 'none', color: '#4f6ef7', fontSize: 13,
          cursor: 'pointer', marginTop: 4, padding: 0, fontFamily: 'Inter, sans-serif',
        }}>{expanded ? 'Show less ↑' : 'Show more →'}</button>
      </div>

      <div>
        <FieldLabel>Format &amp; Price</FieldLabel>
        <div style={{ fontSize: 14, fontWeight: 500, color: '#1a1a1a' }}>
          Buy It Now · <span style={{ color: '#4f6ef7' }}>${price.toFixed(2)}</span>
        </div>
      </div>
    </>
  );
}

function ListingCard({ listing, jobId, itemIndex }) {
  const [platform, setPlatform] = useState('poshmark');
  const [copied, setCopied] = useState(false);
  const [expanded, setExpanded] = useState(false);
  const [ebayPost, setEbayPost] = useState({ status: 'idle', listingUrl: null, error: null });

  const pm = listing.poshmark || {};
  const eb = listing.ebay || {};
  const meta = listing.metadata || {};
  const price = Number(listing.comps?.suggested_price || pm.price || eb.price || 0);

  const title = eb.title || pm.title || 'Item';
  const condition = meta.condition || pm.condition || '—';

  function copyListing() {
    let text;
    if (platform === 'poshmark') {
      text = [
        `Title: ${pm.title || ''}`,
        pm.category ? `Category: ${pm.category}` : '',
        pm.size || meta.size ? `Size: ${pm.size || meta.size}` : '',
        pm.condition || meta.condition ? `Condition: ${pm.condition || meta.condition}` : '',
        pm.brand || meta.brand ? `Brand: ${pm.brand || meta.brand}` : '',
        pm.color || meta.color ? `Color: ${pm.color || meta.color}` : '',
        pm.style_tags?.length ? `Style Tags: ${pm.style_tags.join(' ')}` : '',
        `Description: ${pm.description || ''}`,
        `Price: $${price.toFixed(2)}`,
      ].filter(Boolean).join('\n');
    } else {
      const specs = eb.item_specifics || {};
      text = [
        `Title: ${eb.title || ''}`,
        eb.category ? `Category: ${eb.category}` : '',
        eb.condition || meta.condition ? `Condition: ${eb.condition || meta.condition}` : '',
        specs.Brand || meta.brand ? `Brand: ${specs.Brand || meta.brand}` : '',
        specs.Size || meta.size ? `Size: ${specs.Size || meta.size}` : '',
        specs.Color || meta.color ? `Color: ${specs.Color || meta.color}` : '',
        specs.Material ? `Material: ${specs.Material}` : '',
        specs.Gender ? `Gender: ${specs.Gender}` : '',
        `Description: ${eb.description || ''}`,
        `Price: $${price.toFixed(2)}`,
      ].filter(Boolean).join('\n');
    }
    navigator.clipboard.writeText(text).catch(() => {});
    setCopied(true);
    setTimeout(() => setCopied(false), 1500);
  }

  async function handlePostToEbay() {
    setEbayPost({ status: 'loading', listingUrl: null, error: null });
    try {
      const res = await fetch(`${API_BASE}/api/v1/batch/jobs/${jobId}/items/${itemIndex}/post-ebay`, { method: 'POST' });
      const data = await res.json();
      if (data.success) {
        setEbayPost({ status: 'success', listingUrl: data.listing_url, error: null });
      } else {
        setEbayPost({ status: 'error', listingUrl: null, error: data.error || 'Posting failed' });
      }
    } catch (err) {
      setEbayPost({ status: 'error', listingUrl: null, error: err.message });
    }
  }

  return (
    <div style={{ borderRadius: 14, border: '1px solid #e7e7e7', background: '#ffffff', overflow: 'hidden' }}>

      {/* Header */}
      <div style={{ padding: 16, borderBottom: '1px solid #e7e7e7', display: 'flex', alignItems: 'center', gap: 12 }}>
        <HatchBox size={50} label="" />
        <div style={{ flex: 1, minWidth: 0 }}>
          <div style={{ fontSize: 14, fontWeight: 600, color: '#1a1a1a', marginBottom: 4, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{title}</div>
          <div style={{
            display: 'inline-block',
            fontFamily: 'JetBrains Mono, monospace', fontSize: 10,
            textTransform: 'uppercase', letterSpacing: '0.5px',
            padding: '4px 8px', borderRadius: 999, border: '1px solid #e7e7e7',
            color: '#6b6b6b',
          }}>{condition}</div>
        </div>
        <div style={{ fontSize: 22, fontWeight: 700, color: '#4f6ef7', flexShrink: 0 }}>${price.toFixed(2)}</div>
      </div>

      {/* Platform toggle */}
      <div style={{ padding: '12px 16px', borderBottom: '1px solid #e7e7e7', display: 'flex', gap: 8 }}>
        {['poshmark', 'ebay'].map(p => (
          <button
            key={p}
            onClick={() => { setPlatform(p); setExpanded(false); }}
            style={{
              height: 30, padding: '0 14px', borderRadius: 999, border: 'none',
              background: platform === p ? '#1a1a1a' : '#eff3ff',
              color: platform === p ? '#ffffff' : '#4f6ef7',
              fontSize: 13, fontWeight: 500, cursor: 'pointer', fontFamily: 'Inter, sans-serif',
              transition: 'background 0.15s, color 0.15s',
            }}
          >
            {p === 'poshmark' ? 'Poshmark' : 'eBay'}
          </button>
        ))}
      </div>

      {/* Listing content */}
      <div style={{ padding: 16, borderBottom: '1px solid #e7e7e7' }}>
        {platform === 'poshmark'
          ? <PoshmarkContent pm={pm} price={price} expanded={expanded} setExpanded={setExpanded} />
          : <EbayContent eb={eb} price={price} expanded={expanded} setExpanded={setExpanded} />
        }
      </div>

      {/* Post to eBay button */}
      {platform === 'ebay' && (
        <div style={{ padding: '12px 16px', borderBottom: '1px solid #e7e7e7' }}>
          {ebayPost.status === 'success' ? (
            <a
              href={ebayPost.listingUrl}
              target="_blank"
              rel="noopener noreferrer"
              style={{
                display: 'flex', alignItems: 'center', justifyContent: 'center',
                width: '100%', height: 44, borderRadius: 10,
                background: '#16a34a', color: '#ffffff',
                fontSize: 14, fontWeight: 500, textDecoration: 'none',
                fontFamily: 'Inter, sans-serif',
              }}
            >✓ View on eBay ↗</a>
          ) : (
            <>
              <button
                onClick={handlePostToEbay}
                disabled={ebayPost.status === 'loading'}
                style={{
                  width: '100%', height: 44, borderRadius: 10, border: 'none',
                  background: ebayPost.status === 'error' ? '#dc2626' : '#4f6ef7',
                  color: '#ffffff',
                  fontSize: 14, fontWeight: 500,
                  cursor: ebayPost.status === 'loading' ? 'not-allowed' : 'pointer',
                  fontFamily: 'Inter, sans-serif',
                  display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8,
                  opacity: ebayPost.status === 'loading' ? 0.8 : 1,
                }}
              >
                {ebayPost.status === 'loading' && (
                  <div style={{
                    width: 14, height: 14, borderRadius: '50%', flexShrink: 0,
                    border: '2px solid rgba(255,255,255,0.4)', borderTopColor: '#ffffff',
                    animation: 'flipr-spin 0.8s linear infinite',
                  }} />
                )}
                {ebayPost.status === 'idle' && 'Post to eBay'}
                {ebayPost.status === 'loading' && 'Posting...'}
                {ebayPost.status === 'error' && '✗ Failed — Retry'}
              </button>
              {ebayPost.status === 'error' && ebayPost.error && (
                <div style={{
                  marginTop: 6, fontSize: 12, color: '#dc2626',
                  fontFamily: 'JetBrains Mono, monospace',
                }}>{ebayPost.error}</div>
              )}
            </>
          )}
        </div>
      )}

      {/* Copy button */}
      <div style={{ padding: '12px 16px' }}>
        <button
          onClick={copyListing}
          style={{
            width: '100%', height: 44, borderRadius: 10,
            border: '1px solid #d4d4d4', background: '#ffffff',
            color: copied ? '#4f6ef7' : '#1a1a1a',
            fontSize: 14, fontWeight: 500, cursor: 'pointer',
            fontFamily: 'Inter, sans-serif', transition: 'color 0.15s',
          }}
        >
          {copied ? '✓ Copied!' : `Copy ${platform === 'poshmark' ? 'Poshmark' : 'eBay'} listing`}
        </button>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════
   ROOT APP
══════════════════════════════════════════ */
function App() {
  const [screen, setScreen] = useState('upload');
  const [selectedFiles, setSelectedFiles] = useState([]);
  const [jobId, setJobId] = useState('');
  const [jobData, setJobData] = useState(null);

  function handleAnalyze(files) {
    setSelectedFiles(files);
    setScreen('processing');
  }

  function handleDone(id, data) {
    setJobId(id);
    setJobData(data);
    setScreen('results');
  }

  function handleReset() {
    setSelectedFiles([]);
    setJobId('');
    setJobData(null);
    setScreen('upload');
  }

  return (
    <>
      {screen === 'upload' && <UploadScreen onAnalyze={handleAnalyze} />}
      {screen === 'processing' && <ProcessingScreen files={selectedFiles} onDone={handleDone} />}
      {screen === 'results' && jobData && <ResultsScreen jobId={jobId} jobData={jobData} onReset={handleReset} />}
    </>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
